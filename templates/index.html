<!DOCTYPE html>
<html>
<head>
    <title>Aerospace Jam Example</title>
    <script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
</head>
<body>
    <h1>Aerospace Jam Example</h1>
    <button id="stopButton">Stop action</button>
    <p><b>Barometric pressure: </b> <span id="bmp">Loading...</span> hPa</p>
    <p><b>Current altitude: </b> <span id="altitude">Loading...</span> m</p>
    <button id="setZero">Set zero altitude</button>
    <button id="bmpButton">Measure barometric pressure</button>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var socket = io.connect('http://' + document.domain + ':' + location.port);

            var stopButton = document.getElementById('stopButton');
            stopButton.addEventListener('click', function() {
                socket.emit('stopButton')});

            // BMP
            
            var setZero = document.getElementById('setZero');
            setZero.addEventListener('click', function() {
                socket.emit('setZero')});
            
            var bmpButton = document.getElementById('bmpButton');
            bmpButton.addEventListener('click', function() {
                socket.emit('bmpButton')});

            socket.on('update_bmp', function(msg) {
                var bmpSpan = document.getElementById('bmp');                //assign var and gets ID previously defined (connects html & js by identification)
                bmpSpan.textContent = msg.bmp});                            //sets value according to data sent by server (py)
                var altitudeSpan = document.getElementById('altitude');
                altitudeSpan.textContent = msg.altitude;

            // GYRO

            
        });
    </script>
</body>
</html>
